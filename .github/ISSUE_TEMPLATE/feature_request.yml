name: 功能建议
description: 提议新的交互、视觉或工程能力
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 请先描述使用场景和痛点。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 说明预期交互、替代方案和可能的取舍。
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: 补充材料
      description: 可附草图、视频、论文或相关项目链接。
