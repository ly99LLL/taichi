name: Bug 报告
description: 报告可复现的问题
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: 感谢反馈。涉及未公开安全漏洞时请改用 SECURITY.md 中的私密渠道。
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 实际发生了什么？你原本期望什么？
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      placeholder: "1. 执行...\n2. 做出...\n3. 看到..."
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 版本或提交
      placeholder: v3.0.0 / commit SHA
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境
      description: 操作系统、Python、JDK、GPU、CUDA 和关键依赖版本
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      render: shell
